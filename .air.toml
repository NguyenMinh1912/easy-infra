# air config for `make dev` — watches Go sources and rebuilds/reruns the
# `easy-infra` server on change. The frontend is NOT handled here: Vite owns the
# SPA (see scripts/dev.sh), so ui/ is excluded to avoid rebuild loops.
root = "."
tmp_dir = "tmp"

[build]
# Build into ./tmp so it never clobbers `make build`'s ./easy-infra. The rebuilt
# binary is run with the `serve` subcommand (serves the UI + JSON API on :8080).
cmd = "go build -o ./tmp/easy-infra ."
bin = "./tmp/easy-infra"
args_bin = ["serve"]
include_ext = ["go"]
# Exclude ui/ (Vite's domain), the bootstrapped toolchain, air's own output,
# and scripts so none of them trigger a Go rebuild.
exclude_dir = ["ui", ".go", "tmp", "scripts", ".git"]
exclude_regex = ["_test\\.go"]
delay = 500
stop_on_error = true

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = false
