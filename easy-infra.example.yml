# Example easy-infra PROJECT config.
#
# This file (easy-infra.yml) is a thin project marker: it records the schema
# version and tells easy-infra that this folder is a project. It is tracked in
# git and contains no services and no credentials.
#
# Services live in PROFILE files under .easy-infra/profiles/<name>.yml — each
# profile owns its own services and their full config (see
# easy-infra.profile.example.yml). Those hold secrets and are gitignored.
#
# Run `easy-infra init` to scaffold this file plus a default profile.

version: 1
