name: release

# Build cross-platform binaries and publish a GitHub Release whenever a
# version tag (e.g. v1.2.3) is pushed. The release assets are what
# install.sh downloads, so the asset names here must match the names
# install.sh expects: easy-infra_<os>_<arch>.tar.gz.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Build the SPA so the binaries embed the production frontend
      # (ui/dist is consumed by //go:embed in ui/embed.go).
      - name: Build UI bundle
        run: make ui

      - name: Build release artifacts
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X github.com/minhnc/easy-infra/cmd.version=${VERSION}"
          mkdir -p dist
          # OS/arch matrix — keep in sync with the detection table in install.sh.
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            echo "Building ${GOOS}/${GOARCH} ..."
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -trimpath -ldflags "$LDFLAGS" -o easy-infra .
            tar -czf "dist/easy-infra_${GOOS}_${GOARCH}.tar.gz" easy-infra
            rm -f easy-infra
          done
          # Checksums so install.sh (and users) can verify downloads.
          ( cd dist && sha256sum easy-infra_*.tar.gz > checksums.txt )
          ls -l dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/easy-infra_*.tar.gz
            dist/checksums.txt
